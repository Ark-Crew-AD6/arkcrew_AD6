<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkCrew 훈련 참석 체크</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: #2d3148;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .week-bar {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }

  .week-bar::-webkit-scrollbar { display: none; }

  .week-btn {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .week-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 600;
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 20px 0 10px;
  }

  /* 크루 선택 */
  .crew-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .crew-btn {
    padding: 12px 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-weight: 500;
  }

  .crew-btn:hover { border-color: var(--accent); color: var(--accent); }
  .crew-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 700;
  }

  /* 멤버 카드 */
  .member-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }

  .member-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .member-card.attend { border-color: var(--green); }
  .member-card.absent { border-color: var(--red); }
  .member-card.late   { border-color: var(--orange); }

  .member-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .member-name {
    font-size: 15px;
    font-weight: 600;
    min-width: 60px;
  }

  .status-btns {
    display: flex;
    gap: 6px;
  }

  .status-btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .status-btn.sel-attend { background: var(--green); border-color: var(--green); color: white; font-weight: 700; }
  .status-btn.sel-absent { background: var(--red);   border-color: var(--red);   color: white; font-weight: 700; }
  .status-btn.sel-late   { background: var(--orange);border-color: var(--orange);color: white; font-weight: 700; }

  .reason-box {
    margin-top: 10px;
    display: none;
  }

  .reason-box.show { display: block; }

  .reason-input {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card2);
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .reason-input:focus { border-color: var(--accent); }
  .reason-input::placeholder { color: var(--muted); }

  /* 제출 버튼 */
  .submit-wrap {
    margin-top: 28px;
    padding-bottom: 20px;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: -0.3px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 완료 화면 */
  .done-screen {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .done-icon {
    font-size: 56px;
    margin-bottom: 16px;
  }

  .done-screen h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .done-screen p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .reset-btn {
    margin-top: 28px;
    padding: 12px 28px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  /* 로딩 */
  .loading { opacity: 0.5; pointer-events: none; }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
  }

  .badge-manager { background: rgba(79,142,247,0.15); color: var(--accent); }
  .badge-staff   { background: rgba(124,58,237,0.15); color: var(--accent2); }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px 0 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<header>
  <h1>⛵ ArkCrew 훈련 참석 체크</h1>
  <p id="header-sub">주차와 크루를 선택해주세요</p>
</header>

<!-- 주차 선택 -->
<div class="week-bar" id="week-bar"></div>

<div class="container">

  <!-- 크루 선택 -->
  <div class="section-title">크루 선택</div>
  <div id="loading-msg" style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">
    <span class="spinner" style="display:inline-block"></span> 명단 불러오는 중...
  </div>
  <div class="crew-grid" id="crew-grid"></div>

  <!-- 멤버 리스트 -->
  <div id="member-section" style="display:none">
    <div class="section-title" id="member-section-title">멤버 참석 현황</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="member-list" id="member-list"></div>

    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" onclick="submitData()">제출하기</button>
    </div>
  </div>

  <!-- 완료 화면 -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">✅</div>
    <h2>제출 완료!</h2>
    <p id="done-msg">구글 시트에 자동으로 저장되었습니다.</p>
    <p style="color:var(--muted);font-size:13px;margin-top:12px;">다시 제출하려면 페이지를 새로고침 해주세요 🔄</p>
  </div>

</div>

<script>
// ================================================================
// ⚙️ 설정 - SCRIPT_URL만 수정하세요! 이름은 구글 시트에서 관리
// ================================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLdtu4ny6LQY520VK135mT1sYgCEC9idJu8CQaWBOfr7dgszODDCCsd-2nV9UQezZr/exec";
const WEEKS = ["1주차","2주차","3주차","4주차","5주차","6주차","7주차","8주차","9주차","10주차"];
// ================================================================

let selectedWeek = "";
let selectedCrew = "";
let memberStatuses = {};
let CREWS = {}; // 구글 시트에서 불러옴


// ── 앱 초기화: 명단 먼저 로드 ──
async function init() {
  showLoading(true);
  try {
    const res = await fetch(SCRIPT_URL + "?action=getMembers");
    const data = await res.json();
    CREWS = data.crews; // { "1크루": [{name, isManager}, ...], ... }
    initWeeks();
    initCrews();
  } catch (err) {
    document.getElementById("crew-grid").innerHTML =
      '<p style="color:#ef4444;font-size:13px;padding:10px;">명단을 불러오지 못했어요.<br>SCRIPT_URL을 확인해주세요.</p>';
  }
  showLoading(false);
}

function showLoading(on) {
  document.getElementById("loading-msg").style.display = on ? "block" : "none";
}

function initWeeks() {
  const bar = document.getElementById("week-bar");
  bar.innerHTML = "";
  WEEKS.forEach(w => {
    const btn = document.createElement("button");
    btn.className = "week-btn";
    btn.textContent = w;
    btn.onclick = () => selectWeek(w);
    bar.appendChild(btn);
  });
}

function selectWeek(week) {
  selectedWeek = week;
  document.querySelectorAll(".week-btn").forEach(b => b.classList.toggle("active", b.textContent === week));
  updateHeader();
}

function initCrews() {
  const grid = document.getElementById("crew-grid");
  grid.innerHTML = "";
  Object.keys(CREWS).sort((a,b) => parseInt(a) - parseInt(b)).forEach(crew => {
    const btn = document.createElement("button");
    btn.className = "crew-btn";
    btn.textContent = crew;
    btn.onclick = () => selectCrew(crew);
    grid.appendChild(btn);
  });
}

function selectCrew(crew) {
  if (!selectedWeek) { alert("먼저 주차를 선택해주세요!"); return; }
  selectedCrew = crew;
  memberStatuses = {};
  document.querySelectorAll(".crew-btn").forEach(b => b.classList.toggle("active", b.textContent === crew));
  renderMembers(crew);
  updateHeader();
}

function updateHeader() {
  const sub = document.getElementById("header-sub");
  if (selectedWeek && selectedCrew) sub.textContent = `${selectedWeek} · ${selectedCrew}`;
  else if (selectedWeek) sub.textContent = `${selectedWeek} 선택됨`;
  else sub.textContent = "주차와 크루를 선택해주세요";
}

function renderMembers(crew) {
  const section = document.getElementById("member-section");
  const list = document.getElementById("member-list");
  document.getElementById("member-section-title").textContent = `${crew} 멤버 참석 현황`;
  section.style.display = "block";
  list.innerHTML = "";
  document.getElementById("done-screen").style.display = "none";

  (CREWS[crew] || []).forEach(m => {
    memberStatuses[m.name] = { status: "", reason: "" };
    list.appendChild(createMemberCard(m));
  });
  updateProgress();
}

function createMemberCard(member) {
  const card = document.createElement("div");
  card.className = "member-card";
  card.id = `card-${member.name}`;
  const badge = member.isManager ? `<span class="badge badge-manager">간사</span>`
             : member.isStaff ? `<span class="badge badge-staff">스태프</span>` : "";
  card.innerHTML = `
    <div class="member-top">
      <div class="member-name">${member.name}${badge}</div>
      <div class="status-btns">
        <button class="status-btn" onclick="setStatus('${member.name}', 'attend', this)">참석</button>
        <button class="status-btn" onclick="setStatus('${member.name}', 'absent', this)">불참</button>
        <button class="status-btn" onclick="setStatus('${member.name}', 'late', this)">늦참</button>
      </div>
    </div>
    <div class="reason-box" id="reason-${member.name}">
      <input class="reason-input" id="input-${member.name}" type="text"
        oninput="setReason('${member.name}', this.value)">
    </div>`;
  return card;
}

function setStatus(name, status, btn) {
  const isSame = memberStatuses[name].status === status;
  const card = document.getElementById(`card-${name}`);
  const reasonBox = document.getElementById(`reason-${name}`);

  if (isSame) {
    // 같은 버튼 다시 누르면 취소
    memberStatuses[name].status = "";
    memberStatuses[name].reason = "";
    card.className = "member-card";
    btn.className = "status-btn";
    reasonBox.classList.remove("show");
    document.getElementById(`input-${name}`).value = "";
  } else {
    memberStatuses[name].status = status;
    card.className = `member-card ${status}`;
    btn.parentElement.querySelectorAll(".status-btn").forEach(b => b.className = "status-btn");
    btn.classList.add(`sel-${status}`);
    if (status === "absent" || status === "late") {
      reasonBox.classList.add("show");
      document.getElementById(`input-${name}`).placeholder =
        status === "absent" ? "불참 사유를 입력해주세요" : "도착 예정 시간 입력 (예: 18:30)";
    } else {
      reasonBox.classList.remove("show");
      memberStatuses[name].reason = "";
    }
  }
  updateProgress();
}

function setReason(name, value) { memberStatuses[name].reason = value; }

function updateProgress() {
  const total = Object.keys(memberStatuses).length;
  const done = Object.values(memberStatuses).filter(s => s.status !== "").length;
  document.getElementById("progress-fill").style.width = (total ? done / total * 100 : 0) + "%";
}

async function submitData() {
  if (!selectedWeek || !selectedCrew) { alert("주차와 크루를 선택해주세요!"); return; }
  const incomplete = Object.entries(memberStatuses).filter(([_, s]) => s.status === "");
  if (incomplete.length > 0) {
    const names = incomplete.map(([n]) => n).join(", ");
    if (!confirm(`아직 선택 안 된 멤버:\n${names}\n\n그래도 제출하시겠어요?`)) return;
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>제출 중...`;

  const rows = Object.entries(memberStatuses).map(([name, s]) => ({
    week: selectedWeek, crew: selectedCrew, name,
    status: s.status === "attend" ? "참석" : s.status === "absent" ? "불참" : s.status === "late" ? "늦참" : "",
    reason: s.reason
  }));

  try {
    await fetch(SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ crew: selectedCrew, week: selectedWeek, rows })
    });
    document.getElementById("member-section").style.display = "none";
    document.getElementById("done-screen").style.display = "block";
    document.getElementById("done-msg").textContent =
      `${selectedWeek} ${selectedCrew} 참석 현황이 구글 시트에 저장되었습니다.`;
  } catch (err) {
    alert("오류가 발생했어요. 다시 시도해주세요.");
    btn.disabled = false;
    btn.innerHTML = "제출하기";
  }
}

init();
</script>
</body>
</html>
